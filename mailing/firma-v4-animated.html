<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Optimal Breaks — V4 Animated Deck</title>
  <style>
    /* Animaciones para clientes que lo soporten (Apple Mail, etc) */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes vuBounce { 
      0%, 100% { height: 4px; } 
      50% { height: 18px; } 
    }
    @keyframes bpmPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .spin-vinyl { animation: spin 2.5s linear infinite; }
    .vu-1 { animation: vuBounce 0.4s ease-in-out infinite; }
    .vu-2 { animation: vuBounce 0.6s ease-in-out infinite 0.1s; }
    .vu-3 { animation: vuBounce 0.5s ease-in-out infinite 0.2s; }
    .vu-4 { animation: vuBounce 0.7s ease-in-out infinite 0.15s; }
    .vu-5 { animation: vuBounce 0.4s ease-in-out infinite 0.3s; }
    .bpm-flicker { animation: bpmPulse 1s step-end infinite; }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#111111;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#111111; padding:40px 10px;">
<tr><td align="center">

<table cellpadding="0" cellspacing="0" border="0" width="540" style="max-width:540px; font-family:'Courier New', Courier, monospace; background-color:#0a0a0e; border:4px solid #333333; border-radius:8px; overflow:hidden;">
  
  <!-- CABECERA DECK -->
  <tr>
    <td style="padding:16px 20px; border-bottom:2px dashed #222222;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <!-- Vinilo Animado -->
          <td width="70" valign="middle">
            <!-- Contenedor del vinilo -->
            <div class="spin-vinyl" style="width:60px; height:60px; border-radius:50%; background-color:#050505; border:2px solid #444444; position:relative; overflow:hidden;">
              <!-- Surcos simulados -->
              <div style="position:absolute; top:4px; left:4px; right:4px; bottom:4px; border-radius:50%; border:1px solid #1a1a1a;"></div>
              <div style="position:absolute; top:10px; left:10px; right:10px; bottom:10px; border-radius:50%; border:1px solid #222222;"></div>
              <!-- Galleta central -->
              <div style="width:24px; height:24px; border-radius:50%; background-color:#d62828; position:absolute; top:18px; left:18px; text-align:center;">
                <div style="font-family:'Arial Black', Arial, sans-serif; font-size:7px; color:white; font-weight:bold; line-height:24px; letter-spacing:1px;">OB</div>
              </div>
              <div style="width:4px; height:4px; border-radius:50%; background-color:#ffffff; position:absolute; top:28px; left:28px;"></div>
            </div>
          </td>
          
          <!-- Info -->
          <td valign="middle" style="padding-left:10px;">
            <div style="font-family:'Arial Black', Arial, sans-serif; font-size:18px; color:#ffffff; font-weight:900; letter-spacing:-0.5px;">
              OPTIMAL<span style="color:#f7e733;">BREAKS</span>
            </div>
            <div style="font-size:11px; font-weight:bold; color:#e8dcc8; margin-top:4px; letter-spacing:1px;">
              NARCISO PARDO <span style="color:#555;">|</span> <span style="color:#d62828;">FOUNDER</span>
            </div>
            <div style="font-size:10px; color:#888888; margin-top:4px;">
              <a href="mailto:contacto@optimalbreaks.com" style="color:#f7e733; text-decoration:none;">contacto@optimalbreaks.com</a> <span style="color:#444;">&middot;</span> <a href="tel:+34626823404" style="color:#888; text-decoration:none;">+34 626 823 404</a>
            </div>
          </td>

          <!-- VU Meters Animados -->
          <td width="60" align="right" valign="bottom">
            <table cellpadding="0" cellspacing="2" border="0" style="height:20px;">
              <tr style="vertical-align:bottom;">
                <td valign="bottom" height="20"><div class="vu-1" style="width:6px; height:8px; background-color:#8db600; border-radius:1px;"></div></td>
                <td valign="bottom" height="20"><div class="vu-2" style="width:6px; height:14px; background-color:#8db600; border-radius:1px;"></div></td>
                <td valign="bottom" height="20"><div class="vu-3" style="width:6px; height:18px; background-color:#f7e733; border-radius:1px;"></div></td>
                <td valign="bottom" height="20"><div class="vu-4" style="width:6px; height:12px; background-color:#e85d04; border-radius:1px;"></div></td>
                <td valign="bottom" height="20"><div class="vu-5" style="width:6px; height:6px; background-color:#d62828; border-radius:1px;"></div></td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- FOOTER SOCIAL / BPM -->
  <tr>
    <td style="padding:10px 20px; background-color:#111114;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <!-- Play indicator -->
          <td valign="middle">
            <div class="bpm-flicker" style="display:inline-block; width:8px; height:8px; background-color:#d62828; border-radius:50%; margin-right:6px;"></div>
            <span style="font-size:9px; color:#666666; font-weight:bold; letter-spacing:2px;">▶ LIVE MIX</span>
          </td>
          <!-- Redes -->
          <td align="center" valign="middle">
            <a href="https://optimalbreaks.com" style="font-size:10px; color:#ffffff; font-weight:bold; text-decoration:none; background-color:#d62828; padding:4px 12px; border-radius:2px; letter-spacing:1px;">WEBSITE</a>
          </td>
          <!-- BPM -->
          <td align="right" valign="middle">
            <span style="font-family:'Arial Black', Arial, sans-serif; font-size:14px; color:#f7e733;">135</span>
            <span style="font-size:8px; color:#555555; letter-spacing:1px;">BPM</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>

</td></tr>
</table>

</body>
</html>
