<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Optimal Breaks — V8 Animated Paper</title>
  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes vuBounce {
      0%, 100% { height: 4px; }
      50% { height: 20px; }
    }
    @keyframes bpmPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .spin-vinyl { animation: spin 2.5s linear infinite; }
    .vu-1 { animation: vuBounce 0.4s ease-in-out infinite; }
    .vu-2 { animation: vuBounce 0.6s ease-in-out infinite 0.1s; }
    .vu-3 { animation: vuBounce 0.5s ease-in-out infinite 0.2s; }
    .vu-4 { animation: vuBounce 0.7s ease-in-out infinite 0.15s; }
    .vu-5 { animation: vuBounce 0.45s ease-in-out infinite 0.3s; }
    .vu-6 { animation: vuBounce 0.55s ease-in-out infinite 0.05s; }
    .bpm-flicker { animation: bpmPulse 1s step-end infinite; }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#e8dcc8;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e8dcc8; padding:40px 10px;">
<tr><td align="center">

<table cellpadding="0" cellspacing="0" border="0" width="560" style="max-width:560px; font-family:'Courier New', Courier, monospace; border:4px solid #1a1a1a;">

  <!-- TAPE DECORATION -->
  <tr>
    <td align="center" style="background-color:#e8dcc8; padding:0; font-size:0; line-height:0;">
      <div style="width:90px; height:16px; background-color:rgba(247,231,51,0.55); margin:-8px auto 0 auto; transform:rotate(1deg);">&nbsp;</div>
    </td>
  </tr>

  <!-- PAPER BODY WITH NOTEBOOK LINES -->
  <tr>
    <td style="background-color:#e8dcc8; background-image:repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.06) 28px, rgba(0,0,0,0.06) 29px); padding:14px 20px 16px 20px;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <!-- Vinilo Animado -->
          <td width="70" valign="middle">
            <div class="spin-vinyl" style="width:60px; height:60px; border-radius:50%; background-color:#1a1a1a; border:3px solid #1a1a1a; position:relative; overflow:hidden;">
              <div style="position:absolute; top:4px; left:4px; right:4px; bottom:4px; border-radius:50%; border:1px solid #333333;"></div>
              <div style="position:absolute; top:10px; left:10px; right:10px; bottom:10px; border-radius:50%; border:1px solid #444444;"></div>
              <div style="position:absolute; top:16px; left:16px; right:16px; bottom:16px; border-radius:50%; border:1px solid #333333;"></div>
              <div style="width:24px; height:24px; border-radius:50%; background-color:#d62828; position:absolute; top:18px; left:18px; text-align:center;">
                <div style="font-family:'Arial Black', Arial, sans-serif; font-size:7px; color:white; font-weight:bold; line-height:24px; letter-spacing:1px;">OB</div>
              </div>
              <div style="width:4px; height:4px; border-radius:50%; background-color:#e8dcc8; position:absolute; top:28px; left:28px;"></div>
            </div>
          </td>

          <!-- Info -->
          <td valign="middle" style="padding-left:12px;">
            <div style="font-family:'Arial Black', Arial, sans-serif; font-size:20px; color:#1a1a1a; font-weight:900; letter-spacing:-0.5px; line-height:1;">
              OPTIMAL<span style="color:#d62828;">BREAKS</span>
            </div>
            <div style="font-size:11px; font-weight:bold; color:#1a1a1a; margin-top:5px; letter-spacing:1px;">
              NARCISO PARDO <span style="color:#999;">|</span> <span style="color:#d62828; font-size:9px; letter-spacing:2px;">FOUNDER &amp; CURATOR</span>
            </div>
            <div style="font-size:10px; color:#4a4238; margin-top:5px;">
              <a href="mailto:contacto@optimalbreaks.com" style="color:#d62828; text-decoration:none; border-bottom:1px solid #d62828;">contacto@optimalbreaks.com</a>
              <span style="color:#999; padding:0 4px;">&middot;</span>
              <a href="tel:+34626823404" style="color:#1a1a1a; text-decoration:none;">+34 626 823 404</a>
            </div>
          </td>

          <!-- VU Meters Animados -->
          <td width="55" align="right" valign="bottom">
            <table cellpadding="0" cellspacing="2" border="0" style="height:24px;">
              <tr style="vertical-align:bottom;">
                <td valign="bottom" height="24"><div class="vu-1" style="width:5px; height:8px; background-color:#8db600; border-radius:1px;"></div></td>
                <td valign="bottom" height="24"><div class="vu-2" style="width:5px; height:16px; background-color:#8db600; border-radius:1px;"></div></td>
                <td valign="bottom" height="24"><div class="vu-3" style="width:5px; height:20px; background-color:#f7e733; border-radius:1px;"></div></td>
                <td valign="bottom" height="24"><div class="vu-4" style="width:5px; height:14px; background-color:#e85d04; border-radius:1px;"></div></td>
                <td valign="bottom" height="24"><div class="vu-5" style="width:5px; height:8px; background-color:#d62828; border-radius:1px;"></div></td>
                <td valign="bottom" height="24"><div class="vu-6" style="width:5px; height:5px; background-color:#d62828; border-radius:1px;"></div></td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- BOTTOM BAR: BPM + WEBSITE -->
  <tr>
    <td style="background-color:#1a1a1a; padding:8px 20px;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td valign="middle">
            <div class="bpm-flicker" style="display:inline-block; width:7px; height:7px; background-color:#d62828; border-radius:50%; margin-right:6px;"></div>
            <span style="font-size:8px; color:#666666; font-weight:bold; letter-spacing:2px;">&#9654; NOW PLAYING</span>
          </td>
          <td align="center" valign="middle">
            <a href="https://optimalbreaks.com" style="font-family:'Arial Black', Arial, sans-serif; font-size:9px; color:#ffffff; font-weight:bold; text-decoration:none; background-color:#d62828; padding:3px 10px; letter-spacing:1px;">OPTIMALBREAKS.COM</a>
          </td>
          <td align="right" valign="middle">
            <span style="font-family:'Arial Black', Arial, sans-serif; font-size:14px; color:#f7e733;">135</span>
            <span style="font-size:7px; color:#888888; letter-spacing:1px;">BPM</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>

</table>

</td></tr>
</table>

</body>
</html>
